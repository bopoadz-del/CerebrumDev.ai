services:
  - type: web
    name: cerebrumdev-construction-sess_deploy_demo
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: starter
    region: oregon
    envVars:
      - key: CEREBRUM_DOMAIN_KITS
        value: construction
      - key: CEREBRUM_MASTER_KEY
        value: cd-deploy-3f2d70a5c38dacbdbff99b3e4857cc9d
      - key: CEREBRUM_API_KEY_CDEV
        value: cd-deploy-3f2d70a5c38dacbdbff99b3e4857cc9d
      - key: CORS_ORIGINS
        value: *
      - key: CHROMA_PERSIST_DIR
        value: /app/chroma
      - key: OLLAMA_URL
        value: https://cerebrumdev-ollama.theshovel.ai
      - key: OLLAMA_MODEL
        value: qwen3-coder:480b-cloud
      - key: ENV
        value: production
      - key: PORT
        value: 8000
    disk:
      name: cerebrumdev-construction-sess_deploy_demo-data
      mountPath: /app/data
      sizeGB: 1
