services:
  - type: web
    name: cerebrumdev-backend
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: starter
    region: oregon
    envVars:
      - key: ENV
        value: production
      - key: CEREBRUM_API_URL
        value: https://cerebrum-blocks.onrender.com
      - key: CEREBRUM_API_KEY
        generateValue: true
      - key: QWEN_API_KEY
        sync: false
      - key: QWEN_BASE_URL
        value: https://dashscope.aliyuncs.com/compatible-mode/v1
      - key: QWEN_MODEL
        value: qwen-plus
      - key: CHROMA_PERSIST_DIR
        value: /app/storage/chroma
      - key: STORAGE_PATH
        value: /app/storage
      - key: PYTHONIOENCODING
        value: utf-8
    disk:
      name: cerebrumdev-storage
      mountPath: /app/storage
      sizeGB: 1

  - type: static
    name: cerebrumdev-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://cerebrumdev-backend.onrender.com
